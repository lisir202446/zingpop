# Production product home template.
#
# Do not enable this while ICP filing is still pending if the provider told you
# not to use the domain yet.

limit_req_zone $binary_remote_addr zone=zingpop_www_auth:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=zingpop_www_model:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=zingpop_www_general:10m rate=120r/m;

server {
    listen 80;
    server_name www.zingpop.cn zingpop.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.zingpop.cn zingpop.cn;

    ssl_certificate /etc/letsencrypt/live/www.zingpop.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.zingpop.cn/privkey.pem;

    client_max_body_size 20m;
    limit_req_status 429;

    location ^~ /auth/ {
        limit_req zone=zingpop_www_auth burst=20 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /zen/v1/ {
        limit_req zone=zingpop_www_model burst=60 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Product home. Keep this separate from the workbench host so the workbench
    # can use same-origin API/WebSocket calls without custom frontend changes.
    location / {
        limit_req zone=zingpop_www_general burst=240 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
