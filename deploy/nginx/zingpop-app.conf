# Production app host template.
#
# Do not enable this while ICP filing is still pending if the provider told you
# not to use the domain yet.
#
# This template intentionally serves the workbench on its own host. The existing
# opencode Web UI expects to live at origin root, so a subdomain avoids changing
# opencode frontend routing or asset paths.

map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
}

server {
    listen 80;
    server_name app.zingpop.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name app.zingpop.cn;

    ssl_certificate /etc/letsencrypt/live/app.zingpop.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.zingpop.cn/privkey.pem;

    client_max_body_size 100m;

    location = /_zingpop_auth {
        internal;
        proxy_pass http://127.0.0.1:3000/auth/status;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Original-Method $request_method;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location @zingpop_login {
        return 302 https://www.zingpop.cn/auth/phone?continue=https%3A%2F%2F$host$uri;
    }

    location ^~ /assets/ {
        root /opt/zingpop/app/dist;
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /site.webmanifest {
        root /opt/zingpop/app/dist;
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /favicon-v3.ico {
        root /opt/zingpop/app/dist;
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /favicon-v3.svg {
        root /opt/zingpop/app/dist;
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /favicon-96x96-v3.png {
        root /opt/zingpop/app/dist;
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /apple-touch-icon-v3.png {
        root /opt/zingpop/app/dist;
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /oc-theme-preload.js {
        root /opt/zingpop/app/dist;
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /global/event {
        auth_request /_zingpop_auth;
        error_page 401 = @zingpop_login;

        proxy_pass http://127.0.0.1:3000/auth/workbench/event;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600;
    }

    location = /session/status {
        set $zingpop_client_args $args;

        if ($arg_directory != "") {
            set $zingpop_client_args "";
        }

        if ($arg_workspace != "") {
            return 403;
        }

        auth_request /_zingpop_auth;
        auth_request_set $zingpop_directory $upstream_http_x_opencode_directory;
        auth_request_set $zingpop_workspace $upstream_http_x_opencode_workspace;
        auth_request_set $zingpop_project $upstream_http_x_zingpop_project_id;
        error_page 401 = @zingpop_login;

        proxy_pass http://127.0.0.1:4096$uri?directory=$zingpop_directory&$zingpop_client_args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Opencode-Directory $zingpop_directory;
        proxy_set_header X-Opencode-Workspace $zingpop_workspace;
        proxy_set_header X-Zingpop-Project-ID $zingpop_project;
        include /etc/nginx/snippets/zingpop-opencode-basic-auth.conf;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Original-Method $request_method;
    }

    location ~ ^/(sync|tui)(/|$) {
        return 403;
    }

    location ~ ^/(global/(dispose|upgrade)|instance/dispose)$ {
        return 403;
    }

    location / {
        set $zingpop_client_args $args;

        if ($arg_directory != "") {
            set $zingpop_client_args "";
        }

        if ($arg_workspace != "") {
            return 403;
        }

        auth_request /_zingpop_auth;
        auth_request_set $zingpop_directory $upstream_http_x_opencode_directory;
        auth_request_set $zingpop_workspace $upstream_http_x_opencode_workspace;
        auth_request_set $zingpop_project $upstream_http_x_zingpop_project_id;
        error_page 401 = @zingpop_login;

        proxy_pass http://127.0.0.1:4096$uri?directory=$zingpop_directory&$zingpop_client_args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Opencode-Directory $zingpop_directory;
        proxy_set_header X-Opencode-Workspace $zingpop_workspace;
        proxy_set_header X-Zingpop-Workspace-ID $zingpop_workspace;
        proxy_set_header X-Zingpop-Project-ID $zingpop_project;
        include /etc/nginx/snippets/zingpop-opencode-basic-auth.conf;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }
}
